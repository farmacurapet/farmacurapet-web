<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Sistema Ativo</title>
    <style>
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            /* Fundo com imagem e camada de destaque */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1544568100-847a948585b9?q=80&w=1974&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #333;
        }

        /* Barra Estilo Chrome */
        .chrome-header {
            background: #f1f3f4;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .search-bar {
            background: white;
            border-radius: 20px;
            padding: 8px 20px;
            display: flex;
            flex: 1;
            margin: 0 20px;
            border: 1px solid #dfe1e5;
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 14px;
        }

        /* Layout em Cards (Páginas Destacadas) */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            padding: 0 15px;
        }

        .page-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-top: 5px solid #4CAF50;
        }

        h3 { margin-top: 0; color: #1a73e8; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* Estilização dos Formulários e Botões */
        .input-group { margin-bottom: 15px; position: relative; }
        
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary { background: #1a73e8; color: white; }
        .btn-success { background: #34a853; color: white; }
        .btn-danger { background: #ea4335; color: white; font-size: 11px; padding: 5px; }

        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }

        /* Área de Medicamentos */
        .grid-estoque {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .item-card img { width: 50px; opacity: 0.8; }

        /* Banner de Avisos */
        .news-banner {
            background: #202124;
            color: #fbbc04;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>

            <input type="text" name="q" placeholder="Pesquise clínicas, remédios ou cuidados...">
