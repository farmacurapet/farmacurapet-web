<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Painel Integrado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #2980b9;
            --bg-glass: rgba(255, 255, 255, 0.92);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: url('https://images.unsplash.com/photo-1516733725897-1aa73b87c8e8?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            height: 100vh;
            overflow: hidden; /* Evita rolagem da página inteira, apenas dos painéis */
        }

        /* LAYOUT PRINCIPAL EM DUAS COLUNAS */
        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* LADO ESQUERDO: CONTEÚDO DO SITE */
        .content-side {
            flex: 1.2;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LADO DIREITO: NAVEGAÇÃO GOOGLE/FIREFOX */
        .browser-side {
            flex: 0.8;
            background: var(--primary);
            border-left: 4px solid var(--secondary);
            display: flex;
            flex-direction: column;
        }

        .browser-header {
            padding: 10px;
            color: white;
            text-align: center;
            font-size: 14px;
            background: #1a252f;
        }

        /* LOGIN CENTRALIZADO */
        .login-card {
            background: var(--bg-glass);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .input-box {
            position: relative;
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 16px;
        }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 15px;
            cursor: pointer;
            color: #7f8c8d;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-enter { background: var(--secondary); color: white; }
        .btn-reg { background: #eee; color: #333; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }

        /* ESTOQUE E INFO */
        .info-section {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .mini-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
            body { flex-direction: column; overflow-y: auto; }
            .main-wrapper { flex-direction: column; height: auto; }
            .browser-side { height: 400px; border-left: none; border-top: 4px solid var(--secondary); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="content-side">
        <div class="login-card">
            <h1 style="color: var(--primary); margin-bottom: 20px;">Farmacura Pet 🐾</h1>
            <p style="margin-bottom: 20px; color: #666;">Acesse sua conta ou cadastre uma nova doação</p>
            
            <div class="input-box">
                <input type="text" id="user" placeholder="E-mail ou CPF">
            </div>
            
            <div class="input-box">
                <input type="password" id="pass" placeholder="Senha">
                <i class="fa-solid fa-eye eye-btn" onclick="togglePass()"></i>
            </div>

            <button class="btn-main btn-enter" onclick="executarLogin()">ENTRAR NO SISTEMA</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main btn-reg" onclick="alert('Página de Doador em breve!')">SOU DOADOR</button>
                <button class="btn-main btn-reg" onclick="alert('Página de Receptor em breve!')">SOU RECEPTOR</button>
            </div>
        </div>

        <div class="info-section">
            <div class="mini-card">
                <h4>📍 Clínicas Recife</h4>
                <p><small>UFRPE: (81) 3320-6410</small></p>
                <p><small>HVR: (81) 3355-8179</small></p>
            </div>
            <div class="mini-card" style="text-align: center;">
                <h4>🎮 Jogos e Diversão</h4>
                <a href="https://www.jogos360.com.br" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: bold;">Abrir Jogos 360</a>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <a href="#" style="color: white; margin: 10px; font-size: 24px;"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" style="color: white; margin: 10px; font-size: 24px;"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" style="color: white; margin: 10px; font-size: 24px;"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </div>

    <div class="browser-side">
        <div class="browser-header">
            <i class="fa-solid fa-globe"></i> Espaço de Pesquisa Integrada (Google/Notícias)
        </div>
        <iframe src="https://www.bing.com" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
</div>

<script>
    // 1. FUNÇÃO DO OLHO
    function togglePass() {
        const passInput = document.getElementById('pass');
        const icon = document.querySelector('.eye-btn');
        if (passInput.type === "password") {
            passInput.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // 2. LÓGICA DE LOGIN (CORREÇÃO DE BOTÃO)
    function executarLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(u === "" || p === "") {
            alert("Por favor, preencha todos os campos para entrar.");
        } else {
            alert("Sucesso! Conectando ao banco de dados Farmacura Pet...");
            // Aqui você inseriria o código de conexão com o Supabase
        }
    }

    // 3. REMOÇÃO DO ESTOQUE (BAIXA)
    function darBaixa(id) {
        if(confirm("Confirmar a retirada deste medicamento do estoque virtual?")) {
            console.log("Item " + id + " removido.");
            // Lógica para deletar no banco de dados aqui
        }
    }
</script>

</body>
</html>
