<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Conectando Doações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Farmacura Pet</div>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>Sua doação pode salvar a vida de um pet</h1>
            <p>Conectamos pessoas que têm medicamentos sobrando com quem precisa de ajuda para tratar seu animal.</p>
            
            <div class="acoes">
                <button id="btn-doar" class="btn-principal">Quero Doar</button>
                <button id="btn-receber" class="btn-secundario">Preciso de Ajuda</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Farmacura Pet - 100% Virtual</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
