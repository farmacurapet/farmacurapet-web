<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmaCuraPet Interativa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --primary: #6c5ce7;
            --success: #25d366; /* Cor WhatsApp */
            --shadow: 9px 9px 16px rgb(163,177,198, 0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --inner-shadow: inset 2px 2px 5px rgba(0,0,0,0.1), inset -2px -2px 5px rgba(255,255,255,0.7);
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif; /* Fonte mais criativa/desenhada */
            background-color: var(--bg-color);
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%236c5ce7' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7z'/%3E%3C/svg%3E");
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        .card {
            background: var(--bg-color);
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        /* --- Campo de Senha com Olhinho --- */
        .password-container {
            position: relative;
            width: 100%;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background: var(--bg-color);
            box-shadow: var(--inner-shadow);
            box-sizing: border-box;
            outline: none;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777;
        }

        /* --- Botões Interativos --- */
        .btn {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 15px;
            font-weight: bold; cursor: pointer;
            transition: 0.3s;
            text-decoration: none; color: #333;
            box-shadow: var(--shadow);
        }
        .btn:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }
        
        .btn-social { color: white; border-radius: 50px; width: 60px; height: 60px; padding: 0; }
        .yt { background: #ff0000; } .ig { background: #e1306c; } .fb { background: #3b5998; }
        .wa { background: var(--success); color: white; }
        .btn-game { background: #f1c40f; color: #000; animation: bounce 2s infinite; }

        @keyframes bounce { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.05);} }

        .clinica {
            background: rgba(255,255,255,0.2);
            padding: 15px; border-radius: 15px; margin-top: 10px;
            border: 1px dashed var(--primary);
        }
    </style>
</head>
<body>

    <h1 style="color: var(--primary);">🐾 FarmaCuraPet</h1>

    <div class="card">
        <h3>Acesso</h3>
        <input type="text" placeholder="E-mail ou Usuário">
        <div class="password-container">
            <input type="password" id="senha" placeholder="Senha">
            <i class="fa-solid fa-eye toggle-password" id="toggleEye"></i>
        </div>
        <button class="btn" style="background: var(--primary); color: white;" onclick="alert('Login realizado!')">Entrar</button>
        <div style="font-size: 0.8em; margin-top: 10px;">
            <a href="#" onclick="alert('Email enviado para recuperação!')">Esqueci a senha</a> | <a href="#">Cadastrar Cliente</a>
        </div>
    </div>

    <div class="card">
        <h3>Diversão e Redes</h3>
        <div style="display: flex; justify-content: space-around; margin-bottom: 15px;">
            <a href="https://youtube.com" class="btn btn-social yt"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://instagram.com" class="btn btn-social ig"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://facebook.com" class="btn btn-social fb"><i class="fa-brands fa-facebook"></i></a>
        </div>
        <button class="btn btn-game" onclick="window.open('https://www.google.com/search?q=jogos+360', '_blank')">
            🎮 JOGOS 360°
        </button>
    </div>

    <div class="card">
        <h3>Medicamento</h3>
        <input type="file" id="fotoMed" accept="image/*">
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background:#8e44ad; color:white;" onclick="alert('Registrado como Doador!')">Doador</button>
            <button class="btn" style="background:#e67e22; color:white;" onclick="alert('Registrado como Receptor!')">Receptor</button>
        </div>
    </div>

    <div class="card">
        <h3>🏥 Clínicas em Pernambuco</h3>
        
        <div class="clinica">
            <strong>UFRPE (Rural Federal)</strong>
            <button class="btn" onclick="window.location.href='tel:8133206000'"><i class="fa-solid fa-phone"></i> Ligar</button>
            <button class="btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=UFRPE+Medicina+Veterinaria', '_blank')"><i class="fa-solid fa-map-location-dot"></i> Rota para UFRPE</button>
        </div>

        <div class="clinica">
            <strong>Clínica Veterinária do Recife</strong>
            <button class="btn" onclick="window.location.href='tel:8133558000'"><i class="fa-solid fa-phone"></i> Ligar</button>
            <button class="btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=Clinica+Veterinaria+do+Recife+Cordeiro', '_blank')"><i class="fa-solid fa-map-location-dot"></i> Rota para Cordeiro</button>
        </div>
    </div>

    <div class="card">
        <h3>Contato Direto</h3>
        <input type="tel" id="whatsapp" placeholder="Seu WhatsApp">
        <textarea id="feedback" placeholder="Deixe seu feedback..." style="width:100%; padding:10px; border-radius:12px; background:var(--bg-color); box-shadow:var(--inner-shadow); border:none; margin-bottom:10px;"></textarea>
        <button class="btn wa" onclick="enviarWhats()"><i class="fa-brands fa-whatsapp"></i> Enviar p/ WhatsApp</button>
    </div>

    <script>
        // Função do Olhinho da Senha
        const toggleEye = document.querySelector('#toggleEye');
        const senhaInput = document.querySelector('#senha');

        toggleEye.addEventListener('click', function () {
            const type = senhaInput.getAttribute('type') === 'password' ? 'text' : 'password';
            senhaInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Função para simular envio de WhatsApp
        function enviarWhats() {
            const num = document.getElementById('whatsapp').value;
            const msg = document.getElementById('feedback').value;
            if(!num) { alert('Digite seu número!'); return; }
            window.open(`https://wa.me/5581999999999?text=Oi, meu numero e ${num}. Feedback: ${msg}`, '_blank');
        }
    </script>
</body>
</html>
