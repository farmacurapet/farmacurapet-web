<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CONFIGURAÇÕES GERAIS - RESPONSIVIDADE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1548191265-cc70d3d45ba1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #333;
            padding: 10px;
        }

        .container { max-width: 1000px; margin: auto; }

        /* CABEÇALHO E LOGIN */
        .header-login {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            position: relative;
            margin: 10px auto;
            max-width: 400px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 12px;
            cursor: pointer;
            color: #666;
        }

        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            min-width: 140px;
        }

        .btn-entrar { background: #27ae60; color: white; }
        .btn-doador { background: #2980b9; color: white; }
        .btn-receptor { background: #8e44ad; color: white; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* ESTOQUE VIRTUAL */
        .section-title { color: white; text-align: center; margin: 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .estoque-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .medicamento-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .medicamento-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .btn-baixa { background: #e74c3c; color: white; font-size: 12px; padding: 8px; width: 100%; min-width: auto; }

        /* MURAL E CLINICAS */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) { .info-grid { grid-template-columns: 1fr; } }

        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 15px;
        }

        /* REDES SOCIAIS E FEEDBACK */
        .footer-social {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }

        .social-icon {
            font-size: 30px;
            margin: 0 15px;
            color: white;
            transition: 0.3s;
            text-decoration: none;
        }

        .fa-instagram:hover { color: #e1306c; }
        .fa-facebook:hover { color: #4267B2; }
        .fa-youtube:hover { color: #ff0000; }

        .btn-feedback { background: #f1c40f; color: #333; margin-top: 10px; }

        /* MENSAGENS ROTATIVAS */
        #msg-mural { font-weight: bold; color: #d35400; font-size: 18px; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-login">
        <h1>Farmacura Pet</h1>
        <div class="input-group">
            <input type="email" placeholder="E-mail ou Usuário">
        </div>
        <div class="input-group">
            <input type="password" id="login-senha" placeholder="Sua Senha">
            <span class="eye-icon" onclick="verSenha()"><i class="fa-solid fa-eye" id="eye-icon"></i></span>
        </div>
        <div class="btn-group">
            <button class="btn-entrar">ENTRAR</button>
            <button class="btn-doador">CADASTRE-SE (DOADOR)</button>
            <button class="btn-receptor">CADASTRE-SE (RECEPTOR)</button>
        </div>
    </header>

    <div class="info-grid">
        <div class="panel">
            <h3>🏥 Clínicas Parceiras (Recife)</h3>
            <p><strong>UFRPE (Dois Irmãos):</strong> (81) 3320-6410 
            <a href="https://www.google.com/search?q=https://www.google.com/maps/dir/%3Fapi%3D1%26destination%3DHospital%2BVeterinario%2BUFRPE" target="_blank">↗️ Rota</a></p>
            <hr style="margin: 10px 0;">
            <p><strong>HVR (Cordeiro):</strong> (81) 3355-8179 
            <a href="https://www.google.com/search?q=https://www.google.com/maps/dir/%3Fapi%3D1%26destination%3DHospital%2BVeterinario%2Bdo%2BRecife" target="_blank">↗️ Rota</a></p>
        </div>
        
        <div class="panel" style="text-align: center;">
            <div id="msg-mural">Carregando mensagens...</div>
            <a href="https://www.jogos360.com.br" target="_blank" style="color: #2980b9; font-weight: bold;">🎮 Abrir Jogos 360</a>
        </div>
    </div>

    <h2 class="section-title">📦 Medicamentos para Doação</h2>
    <div class="estoque-grid" id="lista-estoque">
        <div class="medicamento-card">
            <img src="https://via.placeholder.com/150/ff9800/white?text=Medicamento" alt="Remédio">
            <p><strong>Anti-inflamatório</strong></p>
            <p><small>Validade: 10/2026</small></p>
            <button class="btn-baixa" onclick="darBaixa(this)">Confirmar Recebimento</button>
        </div>
    </div>

    <h2 class="section-title">🌐 Espaço Interativo</h2>
    <iframe src="https://www.bing.com/search?q=cuidados+com+pets" width="100%" height="400px" style="border-radius: 20px; border: 5px solid white;"></iframe>

    <div class="footer-social">
        <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="social-icon"><i class="fa-brands fa-facebook"></i></a>
        <a href="#" class="social-icon"><i class="fa-brands fa-youtube"></i></a>
        <br>
        <button class="btn-feedback" onclick="alert('Obrigado pelo seu feedback!')">ENVIAR FEEDBACK</button>
    </div>
</div>

<script>
    // 1. FUNÇÃO DO OLHO (VER SENHA)
    function verSenha() {
        const campo = document.getElementById('login-senha');
        const icone = document.getElementById('eye-icon');
        if (campo.type === "password") {
            campo.type = "text";
            icone.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            campo.type = "password";
            icone.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // 2. DAR BAIXA NO ESTOQUE (REMOVE O ITEM)
    function darBaixa(elemento) {
        if(confirm("Deseja confirmar o recebimento e retirar este item da farmácia virtual?")) {
            const card = elemento.closest('.medicamento-card');
            card.style.transition = "0.5s";
            card.style.transform = "scale(0)";
            setTimeout(() => { card.remove(); }, 500);
        }
    }

    // 3. MENSAGENS ROTATIVAS DO MURAL
    const frases = [
        "Economize e ajude o meio ambiente! 🌍",
        "Farmacura Pet: A união que salva focinhos. 🐾",
        "Descarte incorreto de remédios polui o solo.",
        "Confira as clínicas gratuitas em Recife logo acima!"
    ];
    let contador = 0;
    function girarMural() {
        document.getElementById('msg-mural').innerHTML = frases[contador];
        contador = (contador + 1) % frases.length;
    }
    setInterval(girarMural, 4000);
    girarMural();
</script>

</body>
</html>
