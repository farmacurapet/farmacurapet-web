<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Painel Integrado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #2980b9;
            --bg-glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: url('https://images.unsplash.com/photo-1516733725897-1aa73b87c8e8?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper { display: flex; width: 100%; height: 100%; }

        /* LADO ESQUERDO */
        .content-side {
            flex: 1.2;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LADO DIREITO (NAVEGADOR) */
        .browser-side {
            flex: 0.8;
            background: #f4f4f4;
            border-left: 4px solid var(--secondary);
            display: flex;
            flex-direction: column;
        }

        .browser-header {
            padding: 15px;
            background: var(--primary);
            color: white;
            text-align: center;
        }

        .search-bar-container {
            padding: 10px;
            background: #eee;
            display: flex;
            gap: 5px;
        }

        .search-bar-container input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* CARD DE LOGIN */
        .login-card {
            background: var(--bg-glass);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-bottom: 30px;
        }

        .input-box { position: relative; margin: 15px 0; }
        .input-box input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 18px;
            cursor: pointer;
            color: #7f8c8d;
            z-index: 10;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-enter { background: var(--secondary); color: white; }
        .btn-reg { background: #e8f5e9; color: var(--secondary); border: 1px solid var(--secondary); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        .info-section {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .mini-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        @media (max-width: 1024px) {
            body { overflow-y: auto; }
            .main-wrapper { flex-direction: column; height: auto; }
            .browser-side { height: 500px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="content-side">
        <div class="login-card">
            <h1 style="color: var(--primary); margin-bottom: 10px;">Farmacura Pet 🐾</h1>
            <p style="margin-bottom: 20px; color: #666;">Sistema de Doação de Medicamentos</p>
            
            <div class="input-box">
                <input type="text" id="user" placeholder="E-mail ou Usuário">
            </div>
            
            <div class="input-box">
                <input type="password" id="pass" placeholder="Senha">
                <i class="fa-solid fa-eye eye-btn" id="toggleEye" onclick="togglePass()"></i>
            </div>

            <button class="btn-main btn-enter" onclick="executarLogin()">ENTRAR NO SISTEMA</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main btn-reg" onclick="alert('Iniciando cadastro de Doador...')">SOU DOADOR</button>
                <button class="btn-main btn-reg" onclick="alert('Iniciando cadastro de Receptor...')">SOU RECEPTOR</button>
            </div>
        </div>

        <div class="info-section">
            <div class="mini-card">
                <h4 style="color: var(--primary);"><i class="fa-solid fa-hospital"></i> Clínicas Recife</h4>
                <p><small>UFRPE: (81) 3320-6410</small></p>
                <p><small>HVR: (81) 3355-8179</small></p>
            </div>
            <div class="mini-card" style="text-align: center;">
                <h4 style="color: var(--accent);"><i class="fa-solid fa-gamepad"></i> Diversão</h4>
                <a href="https://www.jogos360.com.br" target="_blank" style="text-decoration: none; font-weight: bold; color: var(--accent);">Jogos 360 Graus ↗️</a>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <a href="#" style="color: white; margin: 10px; font-size: 24px;"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" style="color: white; margin: 10px; font-size: 24px;"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" style="color: white; margin: 10px; font-size: 24px;"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </div>

    <div class="browser-side">
        <div class="browser-header">
            <i class="fa-brands fa-chrome"></i> Navegação Auxiliar
        </div>
        <div class="search-bar-container">
            <input type="text" id="search-input" placeholder="Pesquisar no Google...">
            <button onclick="googleSearch()" style="padding: 5px 10px; cursor: pointer; background: var(--secondary); color: white; border-radius: 5px; border: none;">Buscar</button>
        </div>
        <iframe id="browser-iframe" src="https://www.bing.com" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
</div>

<script>
    // 1. CORREÇÃO DA SENHA (OLHO)
    function togglePass() {
        const passInput = document.getElementById('pass');
        const icon = document.getElementById('toggleEye');
        if (passInput.type === "password") {
            passInput.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // 2. PESQUISA GOOGLE EXTERNA
    function googleSearch() {
        const query = document.getElementById('search-input').value;
        if(query !== "") {
            window.open(`https://www.google.com/search?q=${query}`, '_blank');
        } else {
            alert("Digite algo para pesquisar!");
        }
    }

    // 3. VALIDAÇÃO DE LOGIN
    function executarLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(u === "" || p === "") {
            alert("⚠️ Erro: Preencha usuário e senha!");
        } else {
            alert("✅ Conectando ao Farmacura Pet... Aguarde!");
        }
    }
</script>

</body>
</html>
