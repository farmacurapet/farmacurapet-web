<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Conectando Doações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">Farmacura <span>Pet</span></div>
        </nav>
    </header>

    <main class="container">
        <section id="hero">
            <h1>Sua doação pode salvar a vida de um pet</h1>
            <p>Conectamos pessoas que possuem medicamentos sobrando com quem precisa de ajuda para tratar seu animal. Uma plataforma 100% virtual e solidária.</p>
            
            <div class="acoes">
                <button id="btn-doar" class="btn-principal">Quero Doar</button>
                <button id="btn-receber" class="btn-secundario">Preciso de Ajuda</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Farmacura Pet - Tecnologia para o Bem-Estar Animal</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
