<script>

// PEGAR ELEMENTOS CORRETAMENTE
const telaLogin = document.getElementById("login");
const telaCadastro = document.getElementById("cadastro");
const telaSistema = document.getElementById("sistema");

// MOSTRAR/OCULTAR SENHA
function toggleSenha() {
    let campo = document.getElementById("loginSenha");
    campo.type = campo.type === "password" ? "text" : "password";
}

// TROCAR TELAS
function mostrarCadastro() {
    telaLogin.style.display = "none";
    telaCadastro.style.display = "block";
}

function voltarLogin() {
    telaCadastro.style.display = "none";
    telaLogin.style.display = "block";
}

// CADASTRO
function cadastrar() {
    let user = {
        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        whatsapp: document.getElementById("whatsapp").value,
        senha: document.getElementById("senha").value
    };

    if (!user.nome || !user.email || !user.whatsapp || !user.senha) {
        alert("Preencha todos os campos!");
        return;
    }

    localStorage.setItem("user", JSON.stringify(user));
    alert("Cadastrado com sucesso!");
    voltarLogin();
}

// LOGIN
function login() {
    let user = JSON.parse(localStorage.getItem("user"));

    let email = document.getElementById("loginEmail").value;
    let senha = document.getElementById("loginSenha").value;

    if (!user) {
        alert("Nenhum usuário cadastrado!");
        return;
    }

    if (email === user.email && senha === user.senha) {
        telaLogin.style.display = "none";
        telaSistema.style.display = "block";
        carregar();
    } else {
        alert("Email ou senha incorretos!");
    }
}

// ESQUECI SENHA
function esqueciSenha() {
    let user = JSON.parse(localStorage.getItem("user"));
    if(user){
        alert("Sua senha é: " + user.senha);
    } else {
        alert("Nenhum usuário cadastrado");
    }
}

// DOAÇÃO
function doar() {
    let user = JSON.parse(localStorage.getItem("user"));

    let fileInput = document.getElementById("foto");

    if (!fileInput.files[0]) {
        alert("Selecione uma imagem!");
        return;
    }

    let reader = new FileReader();
    reader.onload = function() {
        let medicamento = {
            nome: document.getElementById("medNome").value,
            validade: document.getElementById("validade").value,
            foto: reader.result,
            doador: user.nome,
            whatsapp: user.whatsapp
        };

        let lista = JSON.parse(localStorage.getItem("medicamentos")) || [];
        lista.push(medicamento);

        localStorage.setItem("medicamentos", JSON.stringify(lista));
        carregar();
    };

    reader.readAsDataURL(fileInput.files[0]);
}

// CARREGAR LISTA
function carregar() {
    let lista = JSON.parse(localStorage.getItem("medicamentos")) || [];
    let div = document.getElementById("lista");
    div.innerHTML = "";

    lista.forEach(m => {
        div.innerHTML += `
        <div class="card">
            <h3>${m.nome}</h3>
            <p>Validade: ${m.validade}</p>
            <img src="${m.foto}">
            <p>Doador: ${m.doador}</p>
            <p>WhatsApp: ${m.whatsapp}</p>
        </div>
        `;
    });
}

// LINKS
function abrir(url){
    window.open(url, "_blank");
}

// LOGOUT
function logout(){
    telaSistema.style.display = "none";
    telaLogin.style.display = "block";
}

</script>
