<style>
  .container-mobile {
    max-width: 400px; /* Simula a largura do celular */
    margin: 0 auto;
    font-family: Arial, sans-serif;
    background-color: #fff;
  }

  .search-bar {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    margin: 10px;
    color: #999;
  }

  .grid-marcas {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
  }

  .card {
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .card img {
    width: 100%;
    display: block;
  }
</style>

<div class="container-mobile">
  <div class="search-bar">Busca por código, nome ou marca</div>
  
  <div style="background:#ccc; height: 150px; text-align:center; padding: 20px;">
    <h2>OFERTAS</h2>
  </div>

  <div class="grid-marcas">
    <div class="card"><img src="logo1.jpg" alt="Marca 1"></div>
    <div class="card"><img src="logo2.jpg" alt="Marca 2"></div>
  </div>
</div>
