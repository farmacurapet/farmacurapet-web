<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmacuraPet - Login</title>
    <style>
        /* CSS Integrado */
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        input {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box; /* Garante que o padding não aumente a largura */
        }

        button {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        .social-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        /* O SEU CÓDIGO CORRIGIDO AQUI */
        .social-links {
            color: #2c3e50; /* Cor escura para contrastar com o fundo claro */
            margin: 0 15px;
            font-size: 28px;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .social-links:hover {
            color: #27ae60;
            transform: translateY(-3px);
        }

        /* Se quiser que o link seja branco em um fundo escuro, mude para white */
    </style>
</head>
<body>

    <div class="login-card">
        <h2>FarmacuraPet</h2>
        
        <div id="login-form">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            
            <button onclick="autenticar()">Entrar</button>
        </div>

        <div class="social-container">
            <a href="#" class="social-links">f</a>
            <a href="#" class="social-links">in</a>
        </div>
    </div>

    <script>
        // JAVASCRIPT Integrado
        function autenticar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Lógica de redirecionamento
            if (email !== "" && senha !== "") {
                // Aqui você coloca o nome exato do seu arquivo de destino
                // Se o arquivo for "cadastro.html", mude abaixo:
                window.location.href = "cadastro-medicamentos.html";
            } else {
                alert("Preencha os campos para prosseguir!");
            }
        }
    </script>

</body>
</html>
