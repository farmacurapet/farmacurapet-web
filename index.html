<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farmacura Pet | Oficial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --brand: #00d2ff; --brand-dark: #3a7bd5; --bg-glass: rgba(255, 255, 255, 0.96); --danger: #ff4757; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: url('https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=2069&auto=format&fit=crop') center/cover fixed; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: -1; }
        header { padding: 30px; text-align: center; color: white; }
        .main-content { max-width: 480px; margin: 0 auto 100px auto; padding: 0 20px; }
        .product-card { background: var(--bg-glass); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; font-family: inherit; }
        .btn-modern { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-delete { background: var(--danger); width: 50px; flex: none !important; }
        .btn-outline { background: none; border: 2px solid var(--brand-dark); color: var(--brand-dark); padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e272e; padding: 12px 30px; border-radius: 50px; display: flex; gap: 25px; z-index: 1000; }
        .nav-dock i { color: white; font-size: 1.3rem; cursor: pointer; opacity: 0.5; }
        .nav-dock i.active { opacity: 1; color: var(--brand); }
        .hidden { display: none !important; }
        .item-mural { border-bottom: 1px solid #eee; padding: 15px 0; }
        .item-mural:last-child { border: none; }
        .badge-clinica { background: #e3f2fd; color: #1976d2; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .pass-container { position: relative; }
        .pass-container i { position: absolute; right: 15px; top: 25px; cursor: pointer; color: #999; }
    </style>
</head>
<body>
<div class="overlay"></div>
<header>
    <h1 style="margin:0; font-weight:800;">Farma<span style="color:var(--brand)">cura</span> Pet</h1>
</header>

<main class="main-content">
    <section id="section-auth" class="product-card">
        <h3 id="auth-title" style="text-align:center">Entrar no Sistema</h3>
        <input type="email" id="email" placeholder="Seu e-mail">
        <div class="pass-container">
            <input type="password" id="password" placeholder="Sua senha">
            <i class="fas fa-eye" id="togglePass" onclick="togglePassword()"></i>
        </div>
        <div id="campos-cadastro" class="hidden">
            <input type="text" id="reg-nome" placeholder="Seu nome">
            <input type="tel" id="reg-zap" placeholder="Seu WhatsApp (com DDD)">
            <input type="text" id="reg-bairro" placeholder="Seu Bairro (Recife)">
        </div>
        <button class="btn-modern" onclick="handleAuth()">Confirmar</button>
        <div style="text-align: center; margin-top: 15px; font-size: 0.85rem;">
            <span id="link-modo" style="color:var(--brand-dark); cursor:pointer; font-weight:600" onclick="mudarModo()">Criar nova conta</span>
            <br><br>
            <span style="color:#999; cursor:pointer" onclick="esqueciSenha()">Esqueci minha senha</span>
        </div>
    </section>

    <section id="section-app" class="hidden">
        <input type="text" id="search-input" placeholder="🔍 Buscar medicamento..." onkeyup="buscar()" style="border-radius: 50px; background: white;">
        <div id="mural" class="product-card" style="margin-top: 20px;"></div>
    </section>

    <section id="section-apoio" class="hidden">
        <div class="product-card">
            <h3 style="text-align:center; margin-top:0"><i class="fas fa-hospital"></i> Clínicas e Hospitais</h3>
            <div class="item-mural">
                <span class="badge-clinica">RECIFE - CORDEIRO</span>
                <h4 style="margin:5px 0">Hospital Veterinário do Recife (HVR)</h4>
                <button class="btn-modern" onclick="window.open('tel:8132244000')"><i class="fas fa-phone"></i> Ligar</button>
            </div>
            <div class="item-mural">
                <span class="badge-clinica">RECIFE - DOIS IRMÃOS</span>
                <h4 style="margin:5px 0">Hospital Veterinário da UFRPE</h4>
                <button class="btn-modern" onclick="window.open('tel:8133206410')"><i class="fas fa-phone"></i> Ligar</button>
            </div>
        </div>
    </section>

    <section id="section-doar" class="hidden">
        <div class="product-card">
            <h3 style="text-align:center">Anunciar Medicamento</h3>
            <input type="text" id="med-nome" placeholder="Nome do Remédio">
            <input type="text" id="med-marca" placeholder="Laboratório">
            <div style="display:flex; gap:10px">
                <input type="text" id="med-mg" placeholder="Dose (mg)">
                <input type="month" id="med-val">
            </div>
            <textarea id="med-obs" placeholder="Detalhes (Ex: Caixa aberta, faltam 2 comprimidos...)"></textarea>
            <button class="btn-modern" onclick="salvarMed()">Publicar Agora</button>
        </div>
    </section>
</main>

<nav class="nav-dock">
    <i class="fas fa-search active" onclick="irPara('section-app')" id="icon-app"></i>
    <i class="fas fa-hospital" onclick="irPara('section-apoio')" id="icon-apoio"></i>
    <i class="fas fa-plus-circle" onclick="irPara('section-doar')" id="icon-doar"></i>
    <i class="fas fa-sign-out-alt" onclick="sair()"></i>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// Configuração Firebase
const firebaseConfig = {
    apiKey: "AIzaSyDAT9VZZ4FdxJuhn3qCI0KuLSdfIGF_fcc",
    authDomain: "farmacia-solidaria-pet.firebaseapp.com",
    databaseURL: "https://farmacia-solidaria-pet-default-rtdb.firebaseio.com",
    projectId: "farmacia-solidaria-pet",
    storageBucket: "farmacia-solidaria-pet.firebasestorage.app",
    messagingSenderId: "863177132865",
    appId: "1:863177132865:web:736861131f7946dc7b2fc0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
let isCadastro = false;
let meuPerfil = null;

// Navegação
function irPara(id) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.nav-dock i').forEach(i => i.classList.remove('active'));
    const iconId = 'icon-' + id.replace('section-', '');
    if(document.getElementById(iconId)) document.getElementById(iconId).classList.add('active');
}

function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('togglePass');
    input.type = input.type === "password" ? "text" : "password";
    icon.classList.toggle('fa-eye-slash');
}

function mudarModo() {
    isCadastro = !isCadastro;
    document.getElementById('campos-cadastro').classList.toggle('hidden');
    document.getElementById('auth-title').innerText = isCadastro ? "Criar Conta" : "Entrar no Sistema";
    document.getElementById('link-modo').innerText = isCadastro ? "Já tenho conta" : "Criar nova conta";
}

// Autenticação
function handleAuth() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    
    if(isCadastro) {
        auth.createUserWithEmailAndPassword(email, pass).then(res => {
            db.ref('usuarios/' + res.user.uid).set({
                nome: document.getElementById('reg-nome').value,
                zap: document.getElementById('reg-zap').value,
                bairro: document.getElementById('reg-bairro').value
            });
        }).catch(e => Swal.fire('Erro', e.message, 'error'));
    } else {
        auth.signInWithEmailAndPassword(email, pass).catch(e => Swal.fire('Erro', 'E-mail ou senha inválidos', 'error'));
    }
}

function sair() { auth.signOut(); }

auth.onAuthStateChanged(user => {
    if(user) {
        db.ref('usuarios/' + user.uid).on('value', snap => {
            meuPerfil = snap.val();
            irPara('section-app');
            carregarMural();
        });
    } else {
        irPara('section-auth');
    }
});

// Lógica de Medicamentos
function salvarMed() {
    const med = {
        nome: document.getElementById('med-nome').value,
        marca: document.getElementById('med-marca').value,
        mg: document.getElementById('med-mg').value,
        val: document.getElementById('med-val').value,
        obs: document.getElementById('med-obs').value,
        zap: meuPerfil ? meuPerfil.zap : "",
        bairro: meuPerfil ? meuPerfil.bairro : "Recife",
        owner: auth.currentUser.uid // Salva quem postou
    };
    
    if(!med.nome || !med.val) return Swal.fire('Erro', 'Nome e Validade são obrigatórios', 'error');
    
    db.ref('estoque_virtual').push(med).then(() => {
        Swal.fire('Sucesso', 'Anunciado com sucesso!', 'success');
        document.querySelectorAll('#section-doar input, #section-doar textarea').forEach(i => i.value = "");
        irPara('section-app');
    });
}

function carregarMural() {
    db.ref('estoque_virtual').on('value', snap => {
        const div = document.getElementById('mural');
        div.innerHTML = "";
        const currentUid = auth.currentUser ? auth.currentUser.uid : null;

        snap.forEach(item => {
            const d = item.val();
            const key = item.key;
            const isOwner = d.owner === currentUid;

            div.innerHTML += `
                <div class="item-mural">
                    <h4 style="margin:0">${d.nome} ${d.mg ? '('+d.mg+'mg)' : ''}</h4>
                    <p style="font-size:0.8rem; color:#666; margin:5px 0">
                        Val: ${d.val} | Bairro: ${d.bairro}<br>
                        ${d.obs ? '<i>' + d.obs + '</i>' : ''}
                    </p>
                    <div style="display:flex; gap:8px">
                        <button class="btn-modern" style="padding:10px; flex:1" onclick="window.open('https://wa.me/55${d.zap}')">
                            <i class="fab fa-whatsapp"></i> Tenho Interesse
                        </button>
                        ${isOwner ? `
                            <button class="btn-modern btn-delete" onclick="removerItem('${key}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>`;
        });
        if(div.innerHTML === "") div.innerHTML = "<p style='text-align:center; color:#999'>Nenhum remédio disponível no momento.</p>";
    });
}

function removerItem(key) {
    Swal.fire({
        title: 'Remover anúncio?',
        text: "O item será excluído permanentemente do mural.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4757',
        confirmButtonText: 'Sim, remover',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            db.ref('estoque_virtual/' + key).remove().then(() => {
                Swal.fire('Deletado!', 'O item foi removido.', 'success');
            });
        }
    });
}

function buscar() {
    const termo = document.getElementById('search-input').value.toLowerCase();
    const itens = document.querySelectorAll('.item-mural');
    itens.forEach(item => {
        item.style.display = item.innerText.toLowerCase().includes(termo) ? "block" : "none";
    });
}
</script>
</body>
</html>
