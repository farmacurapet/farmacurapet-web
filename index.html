<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Portal Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --verde: #2ecc71; --verde-escuro: #27ae60; --bg-card: rgba(255,255,255,0.98); }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1548191265-cc70d3d45ba1?q=80&w=2000');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; min-height: 100vh;
        }

        header {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--verde); text-decoration: none; }

        main { padding: 30px; display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px; }

        .card { background: var(--bg-card); color: #333; padding: 20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

        /* Formulários */
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; color: #555; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }

        button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--verde); color: white; }
        .btn-primary:hover { background: var(--verde-escuro); }
        .btn-baixa { background: #e74c3c; color: white; padding: 5px; font-size: 0.7rem; width: auto; margin: 0; }

        /* Lista de Medicamentos */
        .med-item {
            background: #f4f4f4; border: 1px solid #ddd; padding: 10px; border-radius: 8px;
            margin-bottom: 10px; color: #333; display: flex; align-items: center; gap: 10px;
        }
        .med-img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; background: #ddd; }

        /* Links e Jogos */
        .social-links { display: flex; justify-content: space-around; font-size: 1.8rem; margin-top: 15px; }
        .social-links a { color: #555; text-decoration: none; }
        .fa-instagram:hover { color: #e1306c; }
        .fa-facebook:hover { color: #1877f2; }
        .fa-youtube:hover { color: #ff0000; }

        .game-btn { background: #f1c40f; color: #333; text-align: center; text-decoration: none; display: block; padding: 15px; border-radius: 8px; font-weight: bold; }

        .hidden { display: none; }

        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Farmacura Pet</a>
        <button id="btnSair" class="hidden" onclick="location.reload()" style="width:auto; padding:5px 15px;">Sair</button>
    </header>

    <main>
        <aside>
            <div class="card" style="background: #fffbe6; border: 2px dashed #f1c40f; margin-bottom: 20px;">
                <p style="font-size: 0.8rem; color: #856404; text-align:center;"><strong>ANUNCIE AQUI</strong><br>Sua petshop virtual.</p>
            </div>
            <div class="card">
                <h4 style="color:var(--verde-escuro)">Mural de Avisos</h4>
                <p style="font-size: 0.75rem; margin-top:10px; color: #666;">- Campanha Recife Solidário iniciada!<br>- Doe acessórios usados.</p>
            </div>
        </aside>

        <section id="centralSection">
            <div id="viewLogin" class="card">
                <h3>Acessar</h3>
                <form onsubmit="realizarLogin(event)">
                    <div class="input-group"><label>E-mail</label><input type="email" id="lEmail" required></div>
                    <div class="input-group"><label>Senha</label><input type="password" required></div>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
                <p style="text-align:center; font-size: 0.8rem; margin-top:10px; color:#666;">
                    <a href="#" onclick="alert('Enviamos um link de recuperação para seu e-mail!')">Esqueci a senha</a> | 
                    <a href="#" onclick="trocarTela('viewCadastro')">Cadastre-se</a>
                </p>
            </div>

            <div id="viewCadastro" class="card hidden">
                <h3>Criar Conta</h3>
                <form onsubmit="finalizarCadastro(event)">
                    <div class="input-group"><label>Nome</label><input type="text" required></div>
                    <div class="input-group"><label>WhatsApp</label><input type="tel" placeholder="(81) 99999-9999" required></div>
                    <div class="input-group"><label>E-mail</label><input type="email" required></div>
                    <div class="input-group"><label>Senha</label><input type="password" required></div>
                    <button type="submit" class="btn-primary">Criar Conta</button>
                    <button type="button" onclick="trocarTela('viewLogin')">Voltar</button>
                </form>
            </div>

            <div id="viewApp" class="card hidden">
                <h3>Novo Cadastro</h3>
                <form onsubmit="cadastrarItem(event)">
                    <div class="input-group"><label>Item (Remédio ou Acessório)</label><input type="text" id="iNome" required></div>
                    <div class="input-group"><label>Foto do Item</label><input type="file" id="iFoto" accept="image/*"></div>
                    <button type="submit" class="btn-primary">Postar Doação</button>
                </form>
                <hr style="margin:20px 0;">
                <h4>Itens Disponíveis</h4>
                <div id="feedDoacoes" style="margin-top:15px;"></div>
            </div>
        </section>

        <aside>
            <div class="card">
                <h4>Interatividade</h4>
                <br>
                <a href="https://www.jogos360.com.br" target="_blank" class="game-btn">🎮 JOGOS 360</a>
                <div class="social-links">
                    <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
                    <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </aside>
    </main>

    <script>
        function trocarTela(id) {
            document.getElementById('viewLogin').classList.add('hidden');
            document.getElementById('viewCadastro').classList.add('hidden');
            document.getElementById('viewApp').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function realizarLogin(e) {
            e.preventDefault();
            document.getElementById('btnSair').classList.remove('hidden');
            trocarTela('viewApp');
        }

        function finalizarCadastro(e) {
            e.preventDefault();
            alert("Usuário cadastrado com sucesso!");
            trocarTela('viewLogin');
        }

        function cadastrarItem(e) {
            e.preventDefault();
            const nome = document.getElementById('iNome').value;
            const feed = document.getElementById('feedDoacoes');
            
            // Criar item visual
            const div = document.createElement('div');
            div.className = 'med-item';
            div.innerHTML = `
                <div class="med-img-preview"></div>
                <div style="flex:1">
                    <strong>${nome}</strong><br>
                    <small style="color:green">Disponível</small>
                </div>
                <button class="btn-baixa" onclick="this.parentElement.remove()">Dar Baixa</button>
            `;
            
            feed.prepend(div);
            e.target.reset();
        }
    </script>
</body>
</html>
