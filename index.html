<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmacura Pet</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f0f2f5; display:flex; justify-content:center; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; width:100%; max-width:400px; }
input, button { width:100%; padding:10px; margin:5px 0; }
button { background:#27ae60; color:white; border:none; }
.secondary { background:#3498db; }
#cadastro, #sistema { display:none; }
.card { background:#fafafa; padding:10px; margin-top:10px; }
img { max-width:100%; }
</style>
</head>

<body>

<div class="container">

<div id="login">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input type="password" id="loginSenha" placeholder="Senha">
<button onclick="toggleSenha()">👁</button>
<button onclick="login()">Entrar</button>
<button class="secondary" onclick="mostrarCadastro()">Cadastrar</button>
</div>

<div id="cadastro">
<h2>Cadastro</h2>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="whatsapp" placeholder="WhatsApp">
<input type="password" id="senha" placeholder="Senha">
<button onclick="cadastrar()">Cadastrar</button>
<button onclick="voltarLogin()">Voltar</button>
</div>

<div id="sistema">
<h2>Painel</h2>

<input id="medNome" placeholder="Medicamento">
<input id="validade" placeholder="Validade">
<input type="file" id="foto">

<button onclick="doar()">Doar</button>

<div id="lista"></div>

<button onclick="logout()">Sair</button>
</div>

</div>

<script>

// 🔗 CONEXÃO SUPABASE
const supabase = window.supabase.createClient(
    "https://SEU-PROJETO.supabase.co",
    "SUA_ANON_KEY"
);

// 👁 SENHA
function toggleSenha(){
    let campo = document.getElementById("loginSenha");
    campo.type = campo.type === "password" ? "text" : "password";
}

// TELAS
function mostrarCadastro(){
    login.style.display="none";
    cadastro.style.display="block";
}

function voltarLogin(){
    cadastro.style.display="none";
    login.style.display="block";
}

// CADASTRO
async function cadastrar(){
    const user = {
        nome: nome.value,
        email: email.value,
        whatsapp: whatsapp.value,
        senha: senha.value
    };

    const { error } = await supabase.from("usuarios").insert([user]);

    if(error){
        alert("Erro: "+error.message);
    }else{
        alert("Cadastrado!");
        voltarLogin();
    }
}

// LOGIN
async function login(){
    const { data, error } = await supabase
        .from("usuarios")
        .select("*")
        .eq("email", loginEmail.value)
        .eq("senha", loginSenha.value)
        .single();

    if(error || !data){
        alert("Login inválido!");
    }else{
        localStorage.setItem("user", JSON.stringify(data));
        login.style.display="none";
        sistema.style.display="block";
        carregar();
    }
}

// DOAÇÃO
async function doar(){
    let user = JSON.parse(localStorage.getItem("user"));

    let file = foto.files[0];

    let reader = new FileReader();
    reader.onload = async function(){

        let medicamento = {
            nome: medNome.value,
            validade: validade.value,
            foto: reader.result,
            doador: user.nome,
            whatsapp: user.whatsapp
        };

        await supabase.from("medicamentos").insert([medicamento]);

        carregar();
    }

    reader.readAsDataURL(file);
}

// CARREGAR
async function carregar(){
    const { data } = await supabase
        .from("medicamentos")
        .select("*");

    let div = document.getElementById("lista");
    div.innerHTML="";

    data.forEach(m=>{
        div.innerHTML+=`
        <div class="card">
            <h3>${m.nome}</h3>
            <p>${m.validade}</p>
            <img src="${m.foto}">
            <p>${m.doador}</p>
            <p>${m.whatsapp}</p>
        </div>`;
    });
}

// LOGOUT
function logout(){
    sistema.style.display="none";
    login.style.display="block";
}

</script>

</body>
</html>
