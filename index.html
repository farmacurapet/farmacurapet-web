        <input type="password" id="pass" placeholder="Senha">
        <span class="eye-icon" onclick="togglePass()">👁️</span>
    </div>
    <button class="btn-entrar">Entrar</button>
    <button class="btn-cadastrar">Cadastrar Usuário</button>
</div>

<section id="estoque">

        <p>Validade: 12/2026</p>
        <button onclick="removerDoEstoque(this)">Dar Baixa (Doação Recebida)</button>
    </div>
</section>

<section class="interacao">
    <div class="ads-banner">
        <p id="msg-rotativa">Novidade: Confira as novas parcerias!</p>
    </div>
    
    <div class="links-externos">
        <a href="https://www.jogos360.com.br" target="_blank">🎮 Abrir Jogos 360</a>
